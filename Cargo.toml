[workspace]
members = [
    "src/common",
    "src/migration",
    "src/service"
]
resolver = "3" # Recommended for newer Cargo features

[workspace.dependencies]
anyhow = "1.0.102"
axum = { version = "0.8.9", features = ["macros"] }
chrono = { version = "0.4.44", features = ["serde"] }
config = { version = "0.15.23", features = ["yaml"] }
dotenvy = "0.15"
futures = "0.3.31"
itertools = "0.14.0"
nutype = { version = "0.6.2", features = ["regex", "serde"] }
regex = "1.12.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.149"
sqlx = { version = "0.8.6", features = ["runtime-tokio-rustls", "any", "migrate", "postgres", "uuid", "chrono", "json", "rust_decimal"] }
tokio = { version = "1.48.0", features = ["full"] }
tracing = "0.1.43"
thiserror = "2"

[workspace.dependencies.sea-query]
version = "1.0.0-rc.34"
features = ["backend-postgres", "sqlx-utils", "with-chrono", "with-json", "with-rust_decimal", "with-uuid", "postgres-array", "postgres-interval", "postgres-vector"]

[workspace.dependencies.uuid]
version = "1.18.1"
features = ["v4", "v7"]